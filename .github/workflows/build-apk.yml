name: Build MaX-TV APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.7/bin/gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Inject secrets into local.properties
        run: |
          echo "TMDB_TOKEN=${{ vars.TMDB_TOKEN }}" >> local.properties
          echo "FANART_TOKEN=${{ vars.FANART_TOKEN }}" >> local.properties
          echo "EPG_URL=${{ vars.EPG_URL }}" >> local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Build Release APK
        id: build
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build-full.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "build_exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE
        continue-on-error: true

      - name: Extract error log on failure
        if: steps.build.outputs.build_exit_code != '0'
        run: |
          echo "=== BUILD FAILED ===" > build-error.log
          echo "Date: $(date)" >> build-error.log
          echo "Commit: ${{ github.sha }}" >> build-error.log
          echo "Branch: ${{ github.ref_name }}" >> build-error.log
          echo "" >> build-error.log
          echo "=== ERRORS ===" >> build-error.log
          grep -A 30 "FAILURE\|error:" build-full.log | head -300 >> build-error.log || true
          echo "" >> build-error.log
          echo "=== FULL LOG (last 500 lines) ===" >> build-error.log
          tail -500 build-full.log >> build-error.log

      - name: Upload error log
        if: steps.build.outputs.build_exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build-error.log
          retention-days: 30

      - name: Fail if build error
        if: steps.build.outputs.build_exit_code != '0'
        run: exit 1

      - name: Sign APK
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true

      - name: Rename and package APK
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1 || echo "1.0.0")
          BUILD_NUM=${{ github.run_number }}
          APK_DIR="app/build/outputs/apk/release"
          if [ -f "${{ steps.sign.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign.outputs.signedReleaseFile }}" "MaX-TV-v${VERSION}-build${BUILD_NUM}-signed.apk"
          else
            APK=$(find $APK_DIR -name "*.apk" | head -1)
            cp "$APK" "MaX-TV-v${VERSION}-build${BUILD_NUM}.apk"
          fi
          echo "APK_FILE=$(ls MaX-TV-*.apk | head -1)" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaX-TV-APK-build${{ github.run_number }}
          path: MaX-TV-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-build${{ env.BUILD_NUM }}
          name: "MaX-TV v${{ env.VERSION }} (build ${{ env.BUILD_NUM }})"
          body: |
            ## 🎬 MaX-TV v${{ env.VERSION }} — Build #${{ env.BUILD_NUM }}

            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}

            ### 📦 Installation Android TV / Fire TV
            1. Télécharger le fichier APK ci-dessous
            2. Activer "Sources inconnues" dans les paramètres
            3. Installer via Downloader ou USB

            ### 🔧 Compatibilité
            - Android TV 7.0+ (API 24+)
            - Fire TV Stick 4K / Fire TV Cube
            - Nvidia Shield TV
          files: MaX-TV-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
