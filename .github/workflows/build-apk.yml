name: FocusTV Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: focustv-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report folder
        run: |
          mkdir -p build_reports
          echo "# FocusTV - Rapport de build" > build_reports/BUILD_ERROR_REPORT.md
          echo "" >> build_reports/BUILD_ERROR_REPORT.md
          echo "- Date UTC : $(date -u)" >> build_reports/BUILD_ERROR_REPORT.md
          echo "- Repository : $GITHUB_REPOSITORY" >> build_reports/BUILD_ERROR_REPORT.md
          echo "- Branche : $GITHUB_REF_NAME" >> build_reports/BUILD_ERROR_REPORT.md
          echo "- Commit : $GITHUB_SHA" >> build_reports/BUILD_ERROR_REPORT.md
          echo "- Run : https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> build_reports/BUILD_ERROR_REPORT.md
          echo "" >> build_reports/BUILD_ERROR_REPORT.md
          echo "## Environnement initial" >> build_reports/BUILD_ERROR_REPORT.md
          echo '```text' >> build_reports/BUILD_ERROR_REPORT.md
          uname -a >> build_reports/BUILD_ERROR_REPORT.md
          pwd >> build_reports/BUILD_ERROR_REPORT.md
          echo '```' >> build_reports/BUILD_ERROR_REPORT.md

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Prepare Android SDK
        run: |
          set -o pipefail

          echo "ANDROID_HOME=${ANDROID_HOME}" | tee build_reports/android_sdk.log
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" | tee -a build_reports/android_sdk.log

          if [ -z "$ANDROID_HOME" ]; then
            if [ -n "$ANDROID_SDK_ROOT" ]; then
              echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
              export ANDROID_HOME="$ANDROID_SDK_ROOT"
            else
              echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
              export ANDROID_HOME="/usr/local/lib/android/sdk"
            fi
          fi

          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"

          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME" -name sdkmanager -type f | head -n 1)"
          fi

          if [ -z "$SDKMANAGER" ] || [ ! -f "$SDKMANAGER" ]; then
            echo "ERREUR : sdkmanager introuvable." | tee -a build_reports/android_sdk.log
            find "$ANDROID_HOME" -maxdepth 4 -type f | sort | tee -a build_reports/android_sdk.log
            exit 1
          fi

          echo "sdkmanager utilisé : $SDKMANAGER" | tee -a build_reports/android_sdk.log
          "$SDKMANAGER" --version 2>&1 | tee -a build_reports/android_sdk.log
          yes | "$SDKMANAGER" --licenses 2>&1 | tee -a build_reports/android_sdk.log || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0" 2>&1 | tee -a build_reports/android_sdk.log

      - name: Validate project files
        run: |
          set -o pipefail

          echo "## Vérification fichiers projet" >> build_reports/BUILD_ERROR_REPORT.md

          REQUIRED_FILES=(
            "settings.gradle.kts"
            "build.gradle.kts"
            "gradle.properties"
            "android_app/build.gradle.kts"
            "android_app/src/main/AndroidManifest.xml"
            "android_app/src/main/java/com/focustv/MainActivity.java"
          )

          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERREUR : fichier manquant : $f" | tee -a build_reports/project_check.log
              exit 1
            fi
          done

          echo "Tous les fichiers requis sont présents." | tee build_reports/project_check.log
          find . -maxdepth 4 -type f | sort | sed 's#^./##' | tee build_reports/tree_before_build.log

      - name: Build APK
        run: |
          set -o pipefail
          gradle --version 2>&1 | tee build_reports/gradle_version.log
          gradle :android_app:assembleDebug --stacktrace --info --warning-mode all 2>&1 | tee build_reports/gradle_build.log

      - name: Copy APK
        if: success()
        run: |
          mkdir -p release_apk
          find android_app/build/outputs/apk -name "*.apk" -type f -print0 | while IFS= read -r -d '' apk; do
            cp "$apk" release_apk/
          done
          ls -la release_apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FocusTV-debug-apk
          path: release_apk/*.apk
          if-no-files-found: error

      - name: Complete error report
        if: failure()
        run: |
          REPORT="build_reports/BUILD_ERROR_REPORT.md"

          echo "" >> "$REPORT"
          echo "## Résumé automatique" >> "$REPORT"
          echo "" >> "$REPORT"

          for f in build_reports/project_check.log build_reports/android_sdk.log build_reports/gradle_version.log build_reports/gradle_build.log build_reports/tree_before_build.log; do
            if [ -f "$f" ]; then
              echo "" >> "$REPORT"
              echo "### $f" >> "$REPORT"
              echo '```text' >> "$REPORT"
              tail -n 240 "$f" >> "$REPORT"
              echo '```' >> "$REPORT"
            fi
          done

          echo "" >> "$REPORT"
          echo "## Arborescence utile finale" >> "$REPORT"
          echo '```text' >> "$REPORT"
          find . -maxdepth 5 -type f | sort | sed 's#^./##' | head -n 700 >> "$REPORT"
          echo '```' >> "$REPORT"

      - name: Upload error report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: FocusTV-error-report
          path: build_reports/
          if-no-files-found: warn

      - name: Create GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ.get("GITHUB_REPOSITORY")
          token = os.environ.get("GH_TOKEN")
          run_id = os.environ.get("GITHUB_RUN_ID")
          run_number = os.environ.get("GITHUB_RUN_NUMBER")
          report_path = "build_reports/BUILD_ERROR_REPORT.md"

          title = "Build APK échoué - FocusTV #{}".format(run_number)

          if os.path.exists(report_path):
              with open(report_path, "r", encoding="utf-8") as f:
                  body = f.read()
          else:
              body = "# Build APK échoué\n\nRapport non généré correctement."

          body += "\n\nLien du run : https://github.com/{}/actions/runs/{}\n".format(repo, run_id)

          payload = json.dumps({
              "title": title,
              "body": body,
              "labels": ["build-error", "apk", "FocusTV"]
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.github.com/repos/{}/issues".format(repo),
              data=payload,
              headers={
                  "Authorization": "Bearer {}".format(token),
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as response:
                  print(response.read().decode("utf-8"))
          except Exception as e:
              print("Issue GitHub non créée automatiquement :", e)
          PY
